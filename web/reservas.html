<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas</title>

    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Lexend:wght@300;400;600&family=Sora:wght@300;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-hotel"></i>

            <h2> Hotel <br>Reservas</h2>
        </div>

        <nav>
            <ul>
                <li>
                    <a href="quartos.html">
                        <i class="fa-solid fa-bed"></i>
                        Quartos
                    </a>
                </li>

                <li class="ativo">
                    <a href="reservas.html">
                        <i class="fa-regular fa-calendar"></i>
                        Reservas
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <main>
        <section class="container">

            <div class="cabecalho">
                <div>
                    <h1>Reservas</h1>
                    <p>Gerencie as reservas do hotel</p>
                </div>

                <a href="cadastro-reserva.html">
                    <button class="btn-azul"><i class="fa-solid fa-plus"></i> Nova Reserva</button>
                </a>
            </div>

            <div class="tabela-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Hóspede</th>
                            <th>Entrada</th>
                            <th>Saída</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="lista-reservas">
                    </tbody>
                </table>

                <div id="sem-reservas">
                    <i class="fa-regular fa-calendar"></i>
                    <p>Nenhuma reserva cadastrada</p>
                </div>
            </div>

        </section>
    </main>

    <script src="script.js"></script>

</body>

</html>
